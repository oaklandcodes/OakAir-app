<div class="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-6 font-sans">
  
  <div class="mb-10">
    <app-brand-logo [stacked]="true" [showTagline]="true"></app-brand-logo>
  </div>

  <div class="w-full max-w-md bg-white rounded-[3rem] shadow-2xl shadow-slate-200/60 border border-slate-100 p-10 md:p-14">
    
    <header class="mb-10 text-center">
      <h2 class="text-2xl font-black text-slate-800 mb-2 italic">Crea tu pasaporte</h2>
      <p class="text-slate-400 text-sm leading-relaxed italic">Únete a nuestra comunidad exclusiva de viajeros.</p>
    </header>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <app-form-input
        [label]="'Nombre de Viajero'"
        [icon]="'👤'"
        [type]="'text'"
        [placeholder]="'Ej: Oakland'"
        [autocomplete]="'username'"
        [control]="usernameControl"
      ></app-form-input>

      <app-form-input
        [label]="'Correo Electrónico'"
        [icon]="'✉️'"
        [type]="'email'"
        [placeholder]="'viajero@oakair.com'"
        [autocomplete]="'email'"
        [control]="emailControl"
      ></app-form-input>

      <app-form-input
        [label]="'Contraseña de Seguridad'"
        [icon]="'🔒'"
        [type]="'password'"
        [placeholder]="'••••••••'"
        [autocomplete]="'new-password'"
        [control]="passwordControl"
      ></app-form-input>

      <app-form-input
        [label]="'Confirmar Contraseña'"
        [icon]="'🔒'"
        [type]="'password'"
        [placeholder]="'••••••••'"
        [autocomplete]="'new-password'"
        [control]="confirmPasswordControl"
      ></app-form-input>

      <app-form-submit-button
        [label]="'Comenzar mi viaje'"
        [loadingLabel]="'Emitiendo pasaporte...'"
        [loading]="loading()"
        [disabled]="registerForm.invalid || loading()"
      ></app-form-submit-button>

      @if (errorMessage()) {
        <p class="text-xs text-red-600 font-bold text-center">{{ errorMessage() }}</p>
      }
    </form>

    <div class="mt-10 pt-6 border-t border-slate-50 text-center">
      <p class="text-sm text-slate-400 font-medium">
        ¿Ya eres socio? 
        <a routerLink="/login" class="text-emerald-600 font-black hover:underline ml-1 italic">Accede aquí</a>
      </p>
    </div>
  </div>

  <p class="mt-12 text-slate-300 text-[9px] font-black uppercase tracking-[0.4em]">
    © 2026 OakAir - Luxury Boutique Flights
  </p>
</div>
