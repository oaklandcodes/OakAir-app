<div class="h-dvh bg-slate-50 flex flex-col justify-start items-center pt-6 md:pt-8 px-4 md:px-6 pb-4 font-sans overflow-hidden">
  
  <div class="mb-5 md:mb-7">
    <app-brand-logo [stacked]="true" [showTagline]="true"></app-brand-logo>
  </div>

  <div class="w-full max-w-md bg-white rounded-[3rem] shadow-2xl shadow-slate-200/60 border border-slate-100 p-8 md:p-10">
    
    <header class="mb-6 text-center">
      <h2 class="text-2xl font-black text-slate-800 mb-2 font-serif">¡Hola de nuevo!</h2>
      <p class="text-slate-400 text-sm leading-relaxed italic">Accede a tu cuenta para gestionar tus próximas aventuras.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
      <app-form-input
        [label]="'Tu Correo Electrónico'"
        [icon]="'✉️'"
        [type]="'email'"
        [placeholder]="'ejemplo@correo.com'"
        [autocomplete]="'email'"
        [control]="emailControl"
      ></app-form-input>

      <app-form-input
        [label]="'Tu Contraseña'"
        [icon]="'🔒'"
        [type]="'password'"
        [placeholder]="'••••••••'"
        [autocomplete]="'current-password'"
        [control]="passwordControl"
      ></app-form-input>

      @if (error()) {
        <div class="bg-red-50 border border-red-100 p-4 rounded-xl animate-shake">
          <p class="text-red-600 text-xs font-bold text-center">Hubo un pequeño error. Inténtalo de nuevo.</p>
        </div>
      }

      <app-form-submit-button
        [label]="'Comenzar mi viaje'"
        [loadingLabel]="'Preparando maletas...'"
        [loading]="loading()"
        [disabled]="loading() || form.invalid"
      ></app-form-submit-button>
    </form>

    <div class="mt-6 pt-4 border-t border-slate-50 text-center">
      <p class="text-sm text-slate-400 font-medium">
        ¿Aún no tienes pasaporte OakAir? 
        <a routerLink="/register" class="text-emerald-600 font-black hover:underline ml-1">Únete ahora</a>
      </p>
    </div>
  </div>

  <p class="mt-6 text-slate-300 text-[9px] font-black uppercase tracking-[0.4em]">
    © 2026 OakAir - Luxury Boutique Flights
  </p>
</div>
