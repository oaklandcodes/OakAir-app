<button
  type="submit"
  [disabled]="disabled()"
  [class]="'mt-4 bg-emerald-600 hover:bg-slate-900 text-white font-black rounded-2xl transition-all duration-300 shadow-xl shadow-emerald-100 disabled:bg-slate-200 disabled:text-slate-400 disabled:shadow-none active:scale-95 uppercase tracking-[0.2em] flex justify-center items-center gap-3 group ' + sizeClasses()"
  [class.w-full]="fullWidth()"
>
  {{ buttonText() }}
  @if (trailingIcon()) {
    <span class="group-hover:translate-x-1 transition-transform">{{ trailingIcon() }}</span>
  }
</button>
