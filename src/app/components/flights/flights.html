<div class="min-h-screen bg-gray-50 p-6">
  <header class="flex justify-between items-center border-b-2 border-yellow-400 pb-4 mb-8">
    <h1 class="text-2xl font-bold text-gray-800">✈️ Crew Schedule</h1>
    <button
      (click)="logout()"
      class="bg-yellow-400 hover:bg-yellow-500 text-black font-bold py-2 px-6 rounded-lg transition-colors"
    >
      Exit
    </button>
  </header>

  <main>
    <div class="mb-6">
      <h3 class="text-xl font-semibold text-gray-700">Welcome back, Captain!</h3>
      <p class="text-gray-500">These are your flights for today:</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (flight of flights(); track flight.id) {
        <app-flight-card [flight]="flight" (onReserve)="handleReserve($event)"> </app-flight-card>
      } @empty {
        <div class="col-span-full text-center py-10 bg-white rounded-xl shadow-sm">
          <p class="text-gray-400 italic">No hay vuelos asignados hoy.</p>
        </div>
      }
      <!-- Con @empty, el código cuenta una historia:
@for: "Para cada uno de estos vuelos..."
@empty: "...y si resulta que no hay ninguno, pon esto". -->
    </div>
  </main>
  <div class="mt-12 flex justify-center">
    <button
      routerLink="/search"
      class="flex items-center gap-3 bg-emerald-600 hover:bg-slate-900 text-white font-black py-4 px-10 rounded-2xl transition-all duration-300 shadow-xl shadow-emerald-100 hover:shadow-none hover:-translate-y-1 active:scale-95 group uppercase tracking-widest text-xs"
    >
      <span class="text-lg group-hover:rotate-12 transition-transform">🔍</span>

      Explorar nuevos destinos

      <span class="opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all"
        >→</span
      >
    </button>
  </div>
</div>
