<div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm hover:shadow-xl hover:border-emerald-500 transition-all duration-300 flex flex-col justify-between h-full group">
  
  <div class="flex justify-between items-start mb-6">
    <div>
      <div class="flex items-center gap-3 text-xl font-black text-slate-800">
        <span class="tracking-tight">{{ flight().origin }}</span>
        <span class="text-emerald-500 text-base group-hover:translate-x-1 transition-transform duration-500">✈️</span>
        <span class="tracking-tight">{{ flight().destination }}</span>
      </div>
      <p class="text-[10px] text-slate-400 font-mono mt-1 uppercase tracking-widest">Flight ID: {{ flight().id }}</p>
    </div>
    
    <span class="bg-emerald-50 text-emerald-700 text-[10px] font-black px-3 py-1 rounded-full border border-emerald-100 uppercase tracking-tighter">
      On time
    </span>
  </div>

  <div class="border-t-2 border-dashed border-slate-50 pt-6 mt-auto">
    <div class="flex justify-between items-end mb-5">
      <div class="space-y-1">
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Salida estimada</p>
        <p class="text-slate-700 font-bold flex items-center gap-2">
          <span class="text-emerald-600 italic">●</span>
          {{ flight().date | date:'dd MMM yyyy' }}
        </p>
      </div>
      <div class="text-right">
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Precio Final</p>
        <p class="text-2xl font-black text-slate-900 leading-none">{{ flight().price | currency:'EUR' }}</p>
      </div>
    </div>

    <button (click)="booking()" 
            class="w-full bg-emerald-600 hover:bg-slate-900 text-white font-black py-4 rounded-2xl transition-all duration-300 active:scale-95 text-xs uppercase tracking-widest shadow-lg shadow-emerald-100 hover:shadow-none">
      Reservar
    </button>
  </div>
</div>
