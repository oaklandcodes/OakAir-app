<div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden transition-all duration-500 hover:shadow-2xl hover:-translate-y-1 group mb-6 max-w-6xl mx-auto">
  <div class="p-8 md:p-10 flex flex-col md:flex-row items-center gap-8">
    
    <div class="flex flex-col min-w-[160px]">
      <span class="bg-emerald-50 text-emerald-600 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest border border-emerald-100 w-fit mb-4">
        ON TIME
      </span>
      <h2 class="text-5xl font-black text-slate-900 tracking-tighter leading-none">{{ flight().origin }}</h2>
      
      <p class="text-[11px] text-emerald-600 font-bold uppercase tracking-widest mt-2 italic">
        {{ getCityName(flight().origin) }}
      </p>
      
      <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Flight {{ flight().id }}</span>
    </div>

    <div class="flex-grow flex flex-col items-center justify-center relative min-h-[140px] w-full">
      <div class="w-full h-[1px] bg-slate-100 absolute top-1/2 -translate-y-1/2"></div>
      
      <div class="relative z-10 transform group-hover:translate-x-10 transition-transform duration-1000 ease-in-out bg-white px-6 text-[#00875A]">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-12 h-12 rotate-90 drop-shadow-md">
          <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
        </svg>
      </div>

      <div class="flex flex-col items-center mt-6">
        <span class="text-[10px] text-slate-400 font-black uppercase tracking-[0.3em]">2H 15M · DIRECTO</span>
        <span class="text-xl font-bold text-slate-900 mt-2">08:45 — 10:00</span>
      </div>
    </div>

    <div class="flex flex-col items-end min-w-[160px]">
      <div class="mb-4 invisible text-[10px]">Spacer</div>
      <h2 class="text-5xl font-black text-slate-900 tracking-tighter leading-none text-right">{{ flight().destination }}</h2>
      
      <p class="text-[11px] text-emerald-600 font-bold uppercase tracking-widest mt-2 italic text-right">
        {{ getCityName(flight().destination) }}
      </p>
      
      <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 text-right">TERMINAL A</span>
    </div>

    <div class="flex flex-col items-center md:items-end justify-center border-t md:border-t-0 md:border-l border-slate-100 pt-6 md:pt-0 md:pl-10 min-w-[220px]">
      <span class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Precio Final</span>
      <div class="text-4xl font-black text-slate-900 mb-6 tracking-tighter">
        {{ flight().price | currency:'EUR':'symbol':'1.0-0' }}
      </div>
      
      <button 
        (click)="booking()"
        class="bg-[#00875A] hover:bg-slate-900 text-white font-black py-4 px-10 rounded-2xl uppercase tracking-[0.2em] text-[11px] transition-all duration-300 shadow-lg shadow-emerald-100 w-full active:scale-95">
        RESERVAR
      </button>
    </div>
  </div>
</div>
