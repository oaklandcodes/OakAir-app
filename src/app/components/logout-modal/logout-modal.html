<!-- Backdrop/Overlay -->
@if (isOpen()) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-40 transition-opacity duration-300">
    <!-- Modal Box -->
    <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full mx-4 p-8 transition-all duration-300">
      <!-- Header -->
      <div class="flex items-center gap-4 mb-6">
        <div class="bg-red-100 p-3 rounded-full">
          <span class="text-2xl">⚠️</span>
        </div>
        <h2 class="text-2xl font-black text-slate-900">¿Estás seguro?</h2>
      </div>

      <!-- Message -->
      <p class="text-slate-600 text-base mb-8 font-medium">
        ¿Realmente deseas cerrar sesión? Tendrás que volver a iniciar sesión para acceder a tus vuelos.
      </p>

      <!-- Buttons -->
      <div class="flex gap-4">
        <button
          (click)="handleCancel()"
          class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-900 font-bold py-3 px-6 rounded-2xl transition-all duration-200 uppercase tracking-widest text-xs"
        >
          Cancelar
        </button>
        <button
          (click)="handleConfirm()"
          class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-2xl transition-all duration-200 uppercase tracking-widest text-xs shadow-lg shadow-red-200"
        >
          Logout
        </button>
      </div>
    </div>
  </div>
}
