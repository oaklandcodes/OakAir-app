<div class="space-y-2">
  <label class="ml-1 text-[10px] font-semibold uppercase tracking-[0.35em] text-slate-400">{{ label() }}</label>
  <div class="relative group">
    @if (icon()) {
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-slate-300 transition-colors group-focus-within:text-emerald-700">{{ icon() }}</span>
    }

    <input
      [formControl]="control()"
      [type]="type()"
      [placeholder]="placeholder()"
      [attr.autocomplete]="resolvedAutocomplete()"
      [class]="'oakair-field-shadow w-full rounded-[1.15rem] border border-transparent bg-[#f5f2ed] px-5 py-4 text-[0.95rem] text-slate-800 outline-none transition-all duration-200 placeholder:text-slate-300 focus:border-emerald-600 focus:bg-white ' + (icon() ? 'pl-12' : '')"
    />
  </div>

  @if (control() && control().invalid && control().touched) {
    <div class="flex flex-col gap-2">
      @for (error of getErrorMessage(); track $index) {
        <p class="text-sm text-rose-600">
          {{ error }}
        </p>
      }
    </div>
  }
</div>
